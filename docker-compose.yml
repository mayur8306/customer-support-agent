version: "3.9"

services:
  backend:
    build: .
    container_name: customer-support-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

  frontend:
    build: .
    container_name: customer-support-frontend

    command: streamlit run frontend/app.py --server.address=0.0.0.0

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - backend